name: Go
on: [push]
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go 1.18
      uses: actions/setup-go@v5
      with:
        go-version: 1.18
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Get dependencies
      run: |
        go get -v -t -d ./...

    - name: Install system dependencies (required by Fyne)
      run: sudo apt-get install -y libgl1-mesa-dev xorg-dev

    - name: Build
      run: go build -v .

    - name: Test
      run: go test -v ./...
